<a class="font-label-sm text-on-surface-variant hover:text-primary transition-colors underline decoration-outline-variant underline-offset-4" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-low border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-all px-4 py-3 font-body-md placeholder-on-surface-variant/40 rounded-t-lg" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- CTA Button -->

<button class="w-full font-headline-md py-4 rounded-xl shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2 bg-[#B5D31F] text-on-secondary-fixed hover:opacity-90" type="submit">
