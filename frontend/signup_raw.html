<body class="font-body-md text-on-background flex flex-col min-h-screen bg-surface">
<!-- Top Navigation Bar -->
<nav class="bg-white/80 dark:bg-emerald-950/80 backdrop-blur-md border-b border-emerald-100/20 dark:border-emerald-800/20 shadow-sm docked full-width top-0 z-50">
<div class="flex justify-between items-center px-8 h-20 w-full max-w-7xl mx-auto">
<div class="text-xl font-bold text-emerald-900 dark:text-emerald-50 tracking-tighter font-headline-xl">AjkerDaam</div>
<div class="hidden md:flex items-center gap-8 font-['Epilogue'] text-sm font-medium tracking-tight">
<a class="text-emerald-700/70 dark:text-emerald-200/70 hover:text-emerald-900 dark:hover:text-white transition-colors duration-200" href="#">Consumer</a>
<a class="text-emerald-700/70 dark:text-emerald-200/70 hover:text-emerald-900 dark:hover:text-white transition-colors duration-200" href="#">Vendor</a>
<a class="text-emerald-700/70 dark:text-emerald-200/70 hover:text-emerald-900 dark:hover:text-white transition-colors duration-200" href="#">Admin</a>
</div>
<div class="flex items-center gap-4">
<button class="text-emerald-700/70 dark:text-emerald-200/70 hover:text-emerald-900 font-medium text-sm transition-all">Login</button>
<button class="bg-primary-container text-on-primary px-6 py-2 rounded-xl text-sm font-semibold shadow-sm hover:opacity-90 transition-all">Sign Up</button>
</div>
</div>
</nav>
<!-- Main Content Area -->
<main class="flex-grow flex items-center justify-center px-6 py-xl relative">
<!-- Center Card -->
<div class="bg-surface-container-lowest p-lg md:p-xl rounded-[2rem] shadow-[0_20px_50px_rgba(0,0,0,0.05)] w-full max-w-2xl border border-outline-variant/30">
<div class="text-center mb-lg">
<h1 class="font-headline-lg text-headline-lg text-primary mb-2">Create Account</h1>
<p class="font-body-md text-on-surface-variant max-w-md mx-auto">Join AjkerDaam today for transparent pricing and sustainable sourcing.</p>
</div>
<form class="space-y-md">
<!-- Two Column Layout -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<!-- First Name -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant block ml-1">First Name</label>
<input class="w-full bg-surface-container-low border-b-2 border-transparent focus:border-secondary transition-all outline-none px-4 py-3 rounded-xl text-on-surface placeholder:text-outline-variant" placeholder="Jane" type="text"/>
</div>
<!-- Last Name -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant block ml-1">Last Name</label>
<input class="w-full bg-surface-container-low border-b-2 border-transparent focus:border-secondary transition-all outline-none px-4 py-3 rounded-xl text-on-surface placeholder:text-outline-variant" placeholder="Doe" type="text"/>
</div>
<!-- Email -->
<div class="space-y-xs md:col-span-2">
<label class="font-label-sm text-label-sm text-on-surface-variant block ml-1">Work Email</label>
<input class="w-full bg-surface-container-low border-b-2 border-transparent focus:border-secondary transition-all outline-none px-4 py-3 rounded-xl text-on-surface placeholder:text-outline-variant" placeholder="jane@example.com" type="email"/>
</div>
<!-- Password -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant block ml-1">Password</label>
<input class="w-full bg-surface-container-low border-b-2 border-transparent focus:border-secondary transition-all outline-none px-4 py-3 rounded-xl text-on-surface placeholder:text-outline-variant" placeholder="••••••••" type="password"/>
</div>
<!-- Role Selection -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant block ml-1">I am a...</label>
<div class="relative">
<select class="w-full bg-surface-container-low border-b-2 border-transparent focus:border-secondary transition-all outline-none px-4 py-3 rounded-xl text-on-surface appearance-none">
<option value="consumer">Consumer</option>
<option value="vendor">Vendor</option>
<option value="admin">Admin</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none">expand_more</span>
</div>
</div>
</div>
<!-- Terms -->
<div class="flex items-center gap-3 pt-2">
<input class="w-5 h-5 rounded-md border-outline-variant text-secondary focus:ring-secondary transition-all" id="terms" type="checkbox"/>
<label class="font-label-sm text-label-sm text-on-surface-variant leading-tight" for="terms">
                        I agree to the <a class="text-secondary hover:underline" href="#">Terms of Service</a> and <a class="text-secondary hover:underline" href="#">Sustainability Policy</a>.
                    </label>
</div>
<!-- Submit Action -->
<div class="pt-md">
<button class="w-full bg-primary-container text-on-primary font-headline-md text-headline-md py-4 rounded-xl shadow-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span>Create Account</span>
<span class="material-symbols-outlined" data-weight="fill">arrow_forward</span>
</button>
<p class="text-center mt-6 font-body-md text-on-surface-variant">
                        Already have an account? <a class="text-secondary font-semibold hover:underline" href="#">Login here</a>
</p>
</div>
</form>
</div>
</main>
<!-- Footer -->
<footer class="bg-emerald-50/30 dark:bg-emerald-950/30 w-full py-12 mt-auto border-t border-emerald-100 dark:border-emerald-900">
<div class="flex flex-col md:flex-row justify-between items-center px-8 max-w-7xl mx-auto gap-6">
<div class="text-lg font-semibold text-emerald-900 dark:text-emerald-50 font-headline-md">AjkerDaam</div>
<div class="flex flex-wrap justify-center gap-8 font-['Epilogue'] text-xs uppercase tracking-widest text-emerald-700/60 dark:text-emerald-400/60">
<a class="hover:text-emerald-900 dark:hover:text-emerald-200 transition-all" href="#">Privacy Policy</a>
<a class="hover:text-emerald-900 dark:hover:text-emerald-200 transition-all" href="#">Terms of Service</a>
<a class="hover:text-emerald-900 dark:hover:text-emerald-200 transition-all" href="#">Sustainability Report</a>
<a class="hover:text-emerald-900 dark:hover:text-emerald-200 transition-all" href="#">Support</a>
</div>
<div class="font-['Epilogue'] text-xs uppercase tracking-widest text-emerald-700/60 dark:text-emerald-400/60">
                © 2024 AjkerDaam Systems. Simplified transparency.
            </div>
</div>
</footer>
